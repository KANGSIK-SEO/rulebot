<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>규정이 - 코디세이 규정 봇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5f9 0%, #fff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 192, 203, 0.2);
        }

        .header-emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 36px;
            color: #ff69b4;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #999;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #ff69b4;
            border-bottom-color: #ff69b4;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== AI Chat 스타일 ===== */
        .chat-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 192, 203, 0.15);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #ff69b4;
            color: white;
        }

        .message.ai .message-content {
            background: #f5f5f5;
            color: #333;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ffb6d9;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.2);
        }

        .send-btn {
            padding: 12px 25px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            background: #ff4fa3;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: scale(1);
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff69b4;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .loading:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* ===== Search 스타일 ===== */
        .search-box {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ffb6d9;
            border-radius: 15px;
            background: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 8px 15px;
            border: 2px solid #ffb6d9;
            background: white;
            color: #ff69b4;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .category-btn:hover,
        .category-btn.active {
            background: #ff69b4;
            color: white;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-card {
            background: white;
            border-left: 5px solid #ff69b4;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(255, 192, 203, 0.15);
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.25);
        }

        .result-question {
            font-size: 16px;
            font-weight: 600;
            color: #ff69b4;
            margin-bottom: 12px;
        }

        .result-answer {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 12px;
            padding: 12px;
            background: #fff5f9;
            border-radius: 8px;
        }

        .result-source {
            font-size: 12px;
            color: #999;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
            margin-top: 10px;
        }

        .result-source strong {
            color: #ff69b4;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #ccc;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #ccc;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 28px;
            }

            .header-emoji {
                font-size: 48px;
            }

            .chat-container {
                height: 500px;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-emoji">🐱</div>
            <h1>규정이</h1>
            <p>코디세이 교육생 기본 규칙 답변봇 (AI 업그레이드)</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('chat')">💬 AI 채팅</button>
            <button class="tab-btn" onclick="switchTab('search')">🔍 규정 검색</button>
        </div>

        <!-- AI 채팅 탭 -->
        <div id="chat" class="tab-content active">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="궁금한 규정을 자연스럽게 물어봐요..."
                        onkeypress="handleChatKeypress(event)"
                    >
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">전송</button>
                </div>
            </div>
        </div>

        <!-- 규정 검색 탭 -->
        <div id="search" class="tab-content">
            <div class="search-box">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="궁금한 규정을 검색해보세요... (예: 게임, 시험, 패널티)"
                >
            </div>

            <div class="categories" id="categories"></div>
            <div class="results" id="results"></div>
        </div>

        <div class="footer">
            💗 규정이가 항상 도와줄게요! 모르는 규정은 물어봐 주세요.
        </div>
    </div>

    <script>
        let regulationsData = {};

        // 탭 전환
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // ===== AI 채팅 함수 =====
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const question = input.value.trim();

            if (!question) return;

            // 사용자 메시지 표시
            addMessage(question, 'user');
            input.value = '';

            // 로딩 표시
            const loadingMsg = addMessage('답변을 생각 중입니다...', 'ai');

            try {
                const response = await fetch('http://localhost:5000/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();

                // 로딩 메시지 제거
                loadingMsg.remove();

                if (response.ok) {
                    addMessage(data.answer, 'ai');
                } else {
                    addMessage(`⚠️ 오류: ${data.error}`, 'ai');
                }
            } catch (error) {
                loadingMsg.remove();
                addMessage(`❌ 서버 오류: ${error.message}. Ollama 서버가 실행 중인지 확인해주세요.`, 'ai');
            }
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `<div class="message-content">${text}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageDiv;
        }

        function handleChatKeypress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // ===== 규정 검색 함수 =====
        async function initRegulations() {
            try {
                const response = await fetch('http://localhost:5000/api/regulations');
                regulationsData = await response.json();
                initCategories();
                searchRegulations('');
            } catch (error) {
                console.log('규정 로드 실패, 로컬 데이터 사용');
            }
        }

        function initCategories() {
            const categoriesContainer = document.getElementById('categories');
            const categories = Object.keys(regulationsData['규정이']['categories']);
            
            const allBtn = document.createElement('button');
            allBtn.className = 'category-btn active';
            allBtn.textContent = '전체';
            allBtn.onclick = () => filterByCategory('');
            categoriesContainer.appendChild(allBtn);

            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = category;
                btn.onclick = () => filterByCategory(category);
                categoriesContainer.appendChild(btn);
            });
        }

        function searchRegulations(query, category = '') {
            const results = document.getElementById('results');
            results.innerHTML = '';

            const categories = regulationsData['규정이']['categories'];
            let found = [];

            Object.entries(categories).forEach(([cat, items]) => {
                if (category && cat !== category) return;

                items.forEach(item => {
                    const question = item.question.toLowerCase();
                    const answer = item.answer.toLowerCase();
                    const keywords = item.keywords.map(k => k.toLowerCase());
                    const queryLower = query.toLowerCase();

                    if (queryLower === '' || 
                        question.includes(queryLower) || 
                        answer.includes(queryLower) ||
                        keywords.some(k => k.includes(queryLower))) {
                        found.push({...item, category: cat});
                    }
                });
            });

            if (found.length === 0) {
                results.innerHTML = '<div class="no-results">그 규정은 모르겠습니다. 운영진에게 물어봐 주세요!</div>';
                return;
            }

            found.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="result-question">❓ ${item.question}</div>
                    <div class="result-answer">✅ ${item.answer}</div>
                    <div class="result-source"><strong>📖 근거:</strong> ${item.source}</div>
                `;
                results.appendChild(card);
            });
        }

        function filterByCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            if (category === '') {
                document.querySelectorAll('.category-btn')[0].classList.add('active');
            } else {
                event.target.classList.add('active');
            }

            const searchInput = document.getElementById('searchInput');
            searchRegulations(searchInput.value, category);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchRegulations(e.target.value);
        });

        // 초기화
        initRegulations();
    </script>
</body>
</html>
