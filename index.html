<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>규정이 - 코디세이 규정 봇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5f9 0%, #fff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 192, 203, 0.2);
        }

        .header-emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 36px;
            color: #ff69b4;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ffb6d9;
            border-radius: 15px;
            background: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
        }

        .search-input::placeholder {
            color: #ddd;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 8px 15px;
            border: 2px solid #ffb6d9;
            background: white;
            color: #ff69b4;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .category-btn:hover,
        .category-btn.active {
            background: #ff69b4;
            color: white;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-card {
            background: white;
            border-left: 5px solid #ff69b4;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(255, 192, 203, 0.15);
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.25);
        }

        .result-question {
            font-size: 16px;
            font-weight: 600;
            color: #ff69b4;
            margin-bottom: 12px;
        }

        .result-answer {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 12px;
            padding: 12px;
            background: #fff5f9;
            border-radius: 8px;
        }

        .result-source {
            font-size: 12px;
            color: #999;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
            margin-top: 10px;
        }

        .result-source strong {
            color: #ff69b4;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #ccc;
        }

        .no-results-emoji {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #ccc;
            font-size: 12px;
        }

        .unknown-msg {
            background: #fff9e6;
            border-left: 5px solid #ffc107;
            padding: 12px;
            border-radius: 6px;
            color: #856404;
            font-size: 14px;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 28px;
            }

            .header-emoji {
                font-size: 48px;
            }

            .categories {
                gap: 8px;
            }

            .category-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-emoji">🐱</div>
            <h1>규정이</h1>
            <p>코디세이 교육생 기본 규칙 답변봇</p>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="궁금한 규정을 검색해보세요... (예: 게임, 시험, 패널티)"
            >
        </div>

        <div class="categories" id="categories"></div>

        <div class="results" id="results"></div>

        <div class="footer">
            💗 규정이가 항상 도와줄게요! 모르는 규정은 물어봐 주세요.
        </div>
    </div>

    <script>
        // 규정 데이터 로드
        let regulationsData = {};

        // 더미 데이터 (JSON 로드 전에 사용)
        const dummyData = {
            "규정이": {
                "name": "규정이",
                "description": "코디세이 교육생 기본 규칙 답변봇",
                "categories": {
                    "캐빈 사용 수칙": [
                        {
                            "question": "iMac 뒤 포트에 장비 연결해도 돼?",
                            "answer": "아니요, 전면 포트만 사용하세요.",
                            "source": "코디세이 교육생 기본 규칙 - 캐빈 사용 수칙",
                            "keywords": ["iMac", "포트", "장비"]
                        },
                        {
                            "question": "30W 초과 기기는 어디 콘센트에 연결?",
                            "answer": "캐빈 벽면 콘센트에만 사용 가능합니다. 책상 위 콘센트에는 금지입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 캐빈 사용 수칙",
                            "keywords": ["30W", "전력", "콘센트"]
                        },
                        {
                            "question": "자리에서 게임 해도 돼?",
                            "answer": "기본적으로 금지입니다. 단, 쿼터마스터나 크루메이트와 사전 협의된 경우는 예외입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 캐빈 사용 수칙",
                            "keywords": ["게임", "iMac", "금지"]
                        },
                        {
                            "question": "자리 비울 때 해야 할 것?",
                            "answer": "10초 이상 비울 때는 화면 잠금 또는 로그아웃, 30분 이상 비울 때는 반드시 로그아웃 및 개인 짐 정리 필수입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 캐빈 사용 수칙",
                            "keywords": ["자리", "로그아웃", "잠금"]
                        }
                    ],
                    "공용 공간 이용": [
                        {
                            "question": "공용 공간에서 음식물 섭취 가능?",
                            "answer": "아니요, 음식물 섭취는 금지입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 공용 공간 이용 수칙",
                            "keywords": ["음식", "공용공간", "음료"]
                        },
                        {
                            "question": "의자에 발 올려도 돼?",
                            "answer": "아니요, 의자에 발을 올리면 안 됩니다.",
                            "source": "코디세이 교육생 기본 규칙 - 공용 공간 이용 수칙",
                            "keywords": ["의자", "발", "에티켓"]
                        }
                    ],
                    "학습 관련": [
                        {
                            "question": "동료 평가는 어떻게 해야 해?",
                            "answer": "캠퍼스 내 대면 평가를 해야 하며, 피평가자·평가자 모두 참석이 필수입니다. 무단 평가 취소는 금지이고, 무성의한 코멘트나 저격 평가도 금지입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 학습 관련 수칙",
                            "keywords": ["평가", "동료", "대면"]
                        },
                        {
                            "question": "타인 코드 사용하면?",
                            "answer": "경고를 받습니다. GitHub 등에서 타인 코드 사용 및 표절은 부정행위입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 학습 관련 수칙",
                            "keywords": ["코드", "표절", "부정행위"]
                        }
                    ],
                    "시험 규칙": [
                        {
                            "question": "시험 중 스마트워치나 무선이어폰 착용 가능?",
                            "answer": "아니요, 절대 안 됩니다. 스마트워치와 무선이어폰도 금지 항목입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 시험 부정행위",
                            "keywords": ["시험", "부정행위", "스마트워치"]
                        },
                        {
                            "question": "시험 중 전자기기 소지 적발되면?",
                            "answer": "즉시 퇴실 및 시험 무효 처리됩니다. 다만 자진 신고 시 시험 불참 처리로 전환 가능합니다.",
                            "source": "코디세이 교육생 기본 규칙 - 시험 부정행위",
                            "keywords": ["시험", "적발", "퇴실"]
                        }
                    ],
                    "패널티": [
                        {
                            "question": "패널티는 몇 단계야?",
                            "answer": "1단계(경고 및 크레딧 삭감) → 2단계(중징계 및 학적 제한) → 3단계(강제 퇴교 및 영구 차단) 3단계입니다.",
                            "source": "코디세이 교육생 기본 규칙 - 패널티 조치",
                            "keywords": ["패널티", "징계", "단계"]
                        },
                        {
                            "question": "경고 2회 받으면?",
                            "answer": "크레딧 10P가 삭감됩니다.",
                            "source": "코디세이 교육생 기본 규칙 - 패널티 조치",
                            "keywords": ["경고", "크레딧", "삭감"]
                        }
                    ]
                }
            }
        };

        regulationsData = dummyData;

        // 카테고리 버튼 생성
        function initCategories() {
            const categoriesContainer = document.getElementById('categories');
            const categories = Object.keys(regulationsData['규정이']['categories']);
            
            const allBtn = document.createElement('button');
            allBtn.className = 'category-btn active';
            allBtn.textContent = '전체';
            allBtn.onclick = () => filterByCategory('');
            categoriesContainer.appendChild(allBtn);

            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = category;
                btn.onclick = () => filterByCategory(category);
                categoriesContainer.appendChild(btn);
            });
        }

        // 검색 및 필터링
        function searchRegulations(query, category = '') {
            const results = document.getElementById('results');
            results.innerHTML = '';

            const categories = regulationsData['규정이']['categories'];
            let found = [];

            Object.entries(categories).forEach(([cat, items]) => {
                if (category && cat !== category) return;

                items.forEach(item => {
                    const question = item.question.toLowerCase();
                    const answer = item.answer.toLowerCase();
                    const keywords = item.keywords.map(k => k.toLowerCase());
                    
                    const queryLower = query.toLowerCase();

                    if (queryLower === '' || 
                        question.includes(queryLower) || 
                        answer.includes(queryLower) ||
                        keywords.some(k => k.includes(queryLower))) {
                        found.push({...item, category: cat});
                    }
                });
            });

            if (found.length === 0) {
                results.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-emoji">🤔</div>
                        <p>그 규정은 모르겠습니다.</p>
                        <p style="margin-top: 10px; font-size: 11px;">운영진에게 물어봐 주세요!</p>
                    </div>
                `;
                return;
            }

            found.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="result-question">❓ ${item.question}</div>
                    <div class="result-answer">✅ ${item.answer}</div>
                    <div class="result-source">
                        <strong>📖 근거:</strong> ${item.source}
                    </div>
                `;
                results.appendChild(card);
            });
        }

        // 카테고리 필터
        function filterByCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            if (category === '') {
                document.querySelectorAll('.category-btn')[0].classList.add('active');
            } else {
                event.target.classList.add('active');
            }

            const searchInput = document.getElementById('searchInput');
            searchRegulations(searchInput.value, category);
        }

        // 이벤트 리스너
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchRegulations(e.target.value);
        });

        // 초기화
        initCategories();
        searchRegulations('');
    </script>
</body>
</html>
